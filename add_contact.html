<!DOCTYPE html>
<html>
<head>
    <title>Add Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Add Contact</h1>

    <form method="POST" action="/add">

        <div class="mb-3">

            <label>Name</label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Phone Number</label>

            <input
                type="text"
                name="phone"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Save Contact

        </button>

        <a href="/" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
